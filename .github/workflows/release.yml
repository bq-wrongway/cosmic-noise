name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package_type: msi
          - os: macos-latest
            target: x86_64-apple-darwin
            package_type: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-bundle (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo install cargo-bundle

      - name: Install cargo-wix (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo install cargo-wix

      - name: Build application (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "Building Windows with regular dependencies"
          echo "Temporarily disabling vendored sources to generate lock file"
          mv .cargo/config.toml .cargo/config.toml.backup
          
          echo "Generating lock file for Windows build"
          cargo generate-lockfile
          
          echo "Building with regular dependencies (keeping vendored sources disabled)"
          cargo build --release --target ${{ matrix.target }}
          
          echo "Restoring vendored sources configuration"
          mv .cargo/config.toml.backup .cargo/config.toml

      - name: Build application (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # For macOS, use vendored dependencies
          echo "Generating lock file with vendored sources"
          cargo generate-lockfile
          
          echo "Building with vendored dependencies"
          cargo build --release --target ${{ matrix.target }} --frozen

      - name: Create macOS .app bundle
        if: matrix.os == 'macos-latest'
        run: |
          # Ensure all resources are copied to the bundle
          cargo bundle --release --target ${{ matrix.target }}
          # Rename the bundle to match our app name
          mv "target/${{ matrix.target }}/release/bundle/macos/Cosmic Noise.app" "target/${{ matrix.target }}/release/bundle/macos/CosmicNoise.app"
          # Verify the bundle contains all resources
          ls -la "target/${{ matrix.target }}/release/bundle/macos/CosmicNoise.app/Contents/Resources/"

      - name: Create Windows MSI installer
        if: matrix.os == 'windows-latest'
        run: |
          # Copy the executable and resources to a staging directory
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cosmic_noise.exe dist/
          cp -r assets dist/
          cp -r i18n dist/
          cp -r resources dist/
          # Build MSI using cargo-wix
          cargo wix --target ${{ matrix.target }} --release --path dist

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-noise-macos
          path: target/${{ matrix.target }}/release/bundle/macos/CosmicNoise.app

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-noise-windows
          path: target/${{ matrix.target }}/release/wix/CosmicNoise.msi

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/cosmic-noise-macos/CosmicNoise.app
            artifacts/cosmic-noise-windows/CosmicNoise.msi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 